name: рҹҡҖ Create GitHub Release

on:
  push:
    tags: ['v*']

jobs:
  # в”Җв”Җ ШіШ§Ш®ШӘ Android APK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        working-directory: android/gradle/wrapper
        run: |
          curl -fsSL -o gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar"
          ls -lh gradle-wrapper.jar

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK + AAB (if keystore exists)
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            # APK вҖ” ШЁШұШ§ЫҢ ШҜШ§ЩҶЩ„ЩҲШҜ Щ…ШіШӘЩӮЫҢЩ… ЩҲ ЩҶШөШЁ ШұЩҲЫҢ ШҜШіШӘЪҜШ§ЩҮвҖҢЩҮШ§
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
            # AAB вҖ” ШЁШұШ§ЫҢ Google Play Store
            ./gradlew bundleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
            echo "SIGNED=true" >> $GITHUB_ENV
          else
            echo "вҡ  No keystore вҖ” building unsigned debug APK only"
            echo "SIGNED=false" >> $GITHUB_ENV
          fi

      - name: Collect APK + AAB
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p dist
          # APK вҖ” versioned + stable name (for /releases/latest/download/)
          if ls android/app/build/outputs/apk/release/*.apk 2>/dev/null; then
            cp android/app/build/outputs/apk/release/*.apk dist/SignageCMS-${TAG}-android.apk
          else
            cp android/app/build/outputs/apk/debug/*.apk   dist/SignageCMS-${TAG}-android.apk
          fi
          cp dist/SignageCMS-${TAG}-android.apk dist/SignageCMS-android.apk
          # AAB (Google Play Store)
          if ls android/app/build/outputs/bundle/release/*.aab 2>/dev/null; then
            cp android/app/build/outputs/bundle/release/*.aab \
               dist/SignageCMS-${TAG}-android-playstore.aab
          fi
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/SignageCMS-*.apk

      - name: Upload AAB artifact (Play Store)
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: dist/SignageCMS-*-playstore.aab
          if-no-files-found: ignore

  # в”Җв”Җ ШіШ§Ш®ШӘ Windows Player (Electron) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  windows-player:
    name: Build Windows Player EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows-player/package.json

      - name: Ensure assets directory exists
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "windows-player\assets"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Write-Host "Assets dir: $dir"

      - name: Set version in package.json
        shell: pwsh
        working-directory: windows-player
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          if ($tag -match '^\d+\.\d+\.\d+$') {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $pkg.version = $tag
            $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding utf8
            Write-Host "Version set to $tag"
          }

      - name: Install dependencies
        working-directory: windows-player
        run: npm install

      - name: Build EXE
        working-directory: windows-player
        run: npm run build

      - name: List dist contents
        shell: pwsh
        run: |
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          Get-ChildItem $distDir -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Rename installer (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          $exe = Get-ChildItem $distDir -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $versioned = Join-Path $distDir "SignageCMS-$tag-windows-player-setup.exe"
            $stable    = Join-Path $distDir "SignageCMS-windows-player-setup.exe"
            Rename-Item $exe.FullName $versioned
            Copy-Item $versioned $stable
            Write-Host "Versioned: $versioned"
            Write-Host "Stable:    $stable"
          } else {
            Write-Error "No EXE found in $distDir"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-player-exe
          path: windows-player/dist/SignageCMS-*.exe

  # в”Җв”Җ ШіШ§Ш®ШӘ Windows Server ZIP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  windows-server:
    name: Build Windows Server ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version output
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "VERSION=$v"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build ZIP
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          .\scripts\build-release.ps1 -Version "${{ steps.ver.outputs.VERSION }}" -Output $outDir
          Write-Host "=== dist contents ==="
          Get-ChildItem $outDir | ForEach-Object { Write-Host $_.FullName }

      - name: Rename ZIP (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $src = Get-ChildItem $outDir -Filter "SignageCMS-v*.zip" | Select-Object -First 1
          if ($src) {
            $versioned = Join-Path $outDir "SignageCMS-$tag-server.zip"
            $stable    = Join-Path $outDir "SignageCMS-server.zip"
            Rename-Item $src.FullName $versioned
            Copy-Item $versioned $stable
            Write-Host "Versioned: $versioned"
            Write-Host "Stable:    $stable"
          } else {
            Write-Error "No server ZIP found in $outDir"
            Get-ChildItem $outDir | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-server-zip
          # match BOTH versioned (вҖҰ-v1.6.2-server.zip) and stable (вҖҰ-server.zip)
          path: dist/SignageCMS-*server.zip

  # в”Җв”Җ ШіШ§Ш®ШӘ Windows Server Installer (Inno Setup / ISCC) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  windows-installer:
    name: Build Windows Server Installer (ISCC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version output
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "VERSION=$v"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build clean server payload
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          # ШӘЩҲЩ„ЫҢШҜ ШЁШіШӘЩҮ ШӘЩ…ЫҢШІ ШіШұЩҲШұ (ШЁШҜЩҲЩҶ .git / vendor / .env)
          .\scripts\build-release.ps1 -Version $ver -Output $dist
          $zip = Get-ChildItem $dist -Filter "SignageCMS-v*.zip" | Select-Object -First 1
          if (-not $zip) { Write-Error "Server ZIP not found"; exit 1 }
          $payload = Join-Path $dist "server-files"
          Expand-Archive -Path $zip.FullName -DestinationPath $payload -Force
          Write-Host "Payload: $payload"
          Get-ChildItem $payload | Select-Object Name | Format-Table

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer with ISCC
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $src = Join-Path $env:GITHUB_WORKSPACE "dist\server-files"
          $iss = Join-Path $env:GITHUB_WORKSPACE "installer\SignageCMS.iss"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          Write-Host "ISCC: $iscc"
          & $iscc "/DMyAppVersion=$ver" "/DSourceDir=$src" $iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed"; exit 1 }

      - name: Rename installer (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "installer\Output"
          $exe = Get-ChildItem $outDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer EXE produced"; Get-ChildItem $outDir; exit 1 }
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $versioned = Join-Path $dist "SignageCMS-$tag-server-setup.exe"
          $stable    = Join-Path $dist "SignageCMS-server-setup.exe"
          Copy-Item $exe.FullName $versioned -Force
          Copy-Item $exe.FullName $stable -Force
          Write-Host "Versioned: $versioned"
          Write-Host "Stable:    $stable"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-server-installer
          # match BOTH versioned (вҖҰ-v1.6.2-server-setup.exe) and stable (вҖҰ-server-setup.exe)
          path: dist/SignageCMS-*server-setup.exe

  # в”Җв”Җ ШіШ§Ш®ШӘ ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ All-in-One ЩҲЫҢЩҶШҜЩҲШІ (ШЁШҜЩҲЩҶ Docker) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  windows-native-installer:
    name: Build All-in-One Windows Installer (no Docker)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version output
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup + NSSM
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          choco install nssm -y --no-progress

      - name: Build all-in-one installer (bundles PHP + MariaDB + NSSM)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          # Locate the real 64-bit nssm.exe that choco unpacked (not the shim).
          $nssm = Get-ChildItem "$env:ChocolateyInstall\lib\nssm" -Filter nssm.exe -Recurse -ErrorAction SilentlyContinue |
                    Where-Object { $_.DirectoryName -match 'win64' } | Select-Object -First 1
          if (-not $nssm) {
            $nssm = Get-ChildItem "$env:ChocolateyInstall\lib\nssm" -Filter nssm.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($nssm) { Write-Host "Using NSSM: $($nssm.FullName)" }
          .\scripts\build-native-installer.ps1 -Version $ver -NssmExePath $(if ($nssm) { $nssm.FullName } else { "" })

      - name: Rename installer (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "installer\native\Output"
          $exe = Get-ChildItem $outDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No all-in-one installer produced"; Get-ChildItem $outDir; exit 1 }
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $versioned = Join-Path $dist "SignageCMS-$tag-setup.exe"
          $stable    = Join-Path $dist "SignageCMS-setup.exe"
          Copy-Item $exe.FullName $versioned -Force
          Copy-Item $exe.FullName $stable -Force
          Write-Host "Versioned: $versioned"
          Write-Host "Stable:    $stable"

      - name: Upload all-in-one installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-native-installer
          # match BOTH versioned (вҖҰ-v1.7.0-setup.exe) and stable (вҖҰ-setup.exe)
          path: |
            dist/SignageCMS-*-setup.exe
            dist/SignageCMS-setup.exe

  # в”Җв”Җ ШіШ§Ш®ШӘ GitHub Release в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  create-release:
    name: Create GitHub Release
    needs: [android, windows-player, windows-server, windows-installer, windows-native-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release files ==="
          find release-files -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SignageCMS ${{ github.ref_name }}"
          body: |
            ## SignageCMS ${{ github.ref_name }}

            ### вӯҗ Ш¬ШҜЫҢШҜ: ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ All-in-One ЩҲЫҢЩҶШҜЩҲШІ (ШЁШҜЩҲЩҶ Docker)

            ШҜЫҢЪҜЩҮ ЩҶЫҢШ§ШІЫҢ ШЁЩҮ DockerШҢ WSL2 ЫҢШ§ ШҜШ§ЩҶШҙ ЩҒЩҶЫҢ ЩҶЫҢШіШӘ. ЩҒШ§ЫҢЩ„ **`SignageCMS-setup.exe`**
            ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜШҢ ШҜШ§ШЁЩ„вҖҢЪ©Щ„ЫҢЪ© Ъ©ЩҶЫҢШҜ ЩҲ ЪҶЩҶШҜ ШЁШ§Шұ Next ШЁШІЩҶЫҢШҜ вҖ” ЩҮЩ…ЩҮвҖҢЪҶЫҢШІ (ЩҲШЁвҖҢШіШұЩҲШұШҢ ШҜЫҢШӘШ§ШЁЫҢШі
            MariaDB ЩҲ ШіШұЩҲШұ realtime) ШҜШ§Ш®Щ„ ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ ЩҮШіШӘ ЩҲ Ш®ЩҲШҜЪ©Ш§Шұ ШЁЩҮвҖҢШөЩҲШұШӘ ШіШұЩҲЫҢШі ЩҲЫҢЩҶШҜЩҲШІ ЩҶШөШЁ
            ЩҲ ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ Щ…ЫҢвҖҢШҙЩҲШҜ. ШЁШ№ШҜ Ш§ШІ ЩҶШөШЁШҢ ШҜШ§ШҙШЁЩҲШұШҜ Ш®ЩҲШҜЪ©Ш§Шұ ШұЩҲЫҢ `http://localhost/admin` ШЁШ§ШІ Щ…ЫҢвҖҢШҙЩҲШҜ.

            > рҹ’Ў **Щ„ЫҢЩҶЪ© Ш«Ш§ШЁШӘ ШўШ®ШұЫҢЩҶ ЩҶШіШ®ЩҮ:**
            > `https://github.com/${{ github.repository }}/releases/latest/download/SignageCMS-setup.exe`

            ---

            ### вңЁ ЩӮШ§ШЁЩ„ЫҢШӘвҖҢЩҮШ§ЫҢ Ш¬ШҜЫҢШҜ (v1.6.0)

            #### рҹ’¬ ШіЫҢШіШӘЩ… ЩҫЫҢШ§Щ…вҖҢЩҮШ§ЫҢ ШІЩ…Ш§ЩҶвҖҢШЁЩҶШҜЫҢвҖҢШҙШҜЩҮ
            - Ш§ШұШіШ§Щ„ ЩҫЫҢШ§Щ…вҖҢЩҮШ§ЫҢ Ш®ЩҲШҙШ§Щ…ШҜШҢ ШӘШЁШұЫҢЪ© ЩҲ Ш§Ш№Щ„Ш§ЩҶ ШЁШ§ ШІЩ…Ш§ЩҶвҖҢШЁЩҶШҜЫҢ ШҜЩӮЫҢЩӮ ШұЩҲЫҢ ШҙШ§ШҙЩҮвҖҢЩҮШ§
            - Ш§ЩҶЩҲШ§Ш№ ЩҶЩ…Ш§ЫҢШҙ: OverlayШҢ FullscreenШҢ PopupШҢ Banner
            - ЩҮШҜЩҒвҖҢЪҜШ°Ш§ШұЫҢ: ЩҮЩ…ЩҮ ШҙШ§ШҙЩҮвҖҢЩҮШ§ / ШҙШ§ШҙЩҮ Ш®Ш§Шө / ЪҜШұЩҲЩҮ
            - ШӘЪ©ШұШ§Шұ: ЫҢЪ©вҖҢШЁШ§ШұШҢ ШұЩҲШІШ§ЩҶЩҮШҢ ЩҮЩҒШӘЪҜЫҢШҢ Щ…Ш§ЩҮШ§ЩҶЩҮ
            - Щ…ШӯШӘЩҲШ§ЫҢ ШіЩҮвҖҢШІШЁШ§ЩҶЩҮ (ЩҒШ§ШұШіЫҢ / Ш§ЩҶЪҜЩ„ЫҢШіЫҢ / Ш№ШұШЁЫҢ) ШұЩҲЫҢ ЩҮШұ ЩҫЫҢШ§Щ…

            #### рҹҢҗ ШұШ§ШЁШ· Ъ©Ш§ШұШЁШұЫҢ ЪҶЩҶШҜШІШЁШ§ЩҶЩҮ (fa / en / ar)
            - ШіЩҲШҰЫҢЪҶ ШІШЁШ§ЩҶ Ш§ШІ topbar ШҜШұ ЫҢЪ© Ъ©Щ„ЫҢЪ©
            - ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ъ©Ш§Щ…Щ„ RTL (ЩҒШ§ШұШіЫҢ/Ш№ШұШЁЫҢ) ЩҲ LTR (Ш§ЩҶЪҜЩ„ЫҢШіЫҢ)
            - ШӘШәЫҢЫҢШұ Ш®ЩҲШҜЪ©Ш§Шұ ЩҒЩҲЩҶШӘ: Vazirmatn / Inter / Tajawal
            - ШӘЩ…Ш§Щ… Щ…ШӘЩҶвҖҢЩҮШ§ЫҢ ШұШ§ШЁШ· ШӘШұШ¬Щ…ЩҮвҖҢШҙШҜЩҮ ШҜШұ ШіЩҮ ШІШЁШ§ЩҶ

            #### в¬Ў ЩҶЩҲШ№ ШҙШ§ШҙЩҮ Monitor 3D
            - ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ш§ШІ Щ…Ш§ЩҶЫҢШӘЩҲШұЩҮШ§ЫҢ ЩҮЩҲЩ„ЩҲЪҜШұШ§ЩҒЫҢЪ© ЩҲ glasses-free 3D ШӘШЁЩ„ЫҢШәШ§ШӘЫҢ
            - ЩҒШұЩ…ШӘвҖҢЩҮШ§: Normal+DepthШҢ Hologram LEDШҢ SBSШҢ AnaglyphicШҢ Top-Bottom
            - Ш¬Щ„ЩҲЩҮвҖҢЩҮШ§ЫҢ ШЁШөШұЫҢ: parallaxШҢ scan-lineШҢ glowШҢ depth badge
            - ШӘЩҶШёЫҢЩ…Ш§ШӘ Ш§Ш®ШӘШөШ§ШөЫҢ ШҜШұ ЩҫЩҶЩ„ Щ…ШҜЫҢШұЫҢШӘ + ЩҫЫҢШҙвҖҢЩҶЩ…Ш§ЫҢШҙ Щ…ШіШӘЩӮЫҢЩ…

            #### рҹ“ә ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ TVHeadend
            - Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ЩҶШ§Щ„вҖҢЩҮШ§ЫҢ Live TV Ш§ШІ Ш·ШұЫҢЩӮ TVHeadend
            - Щ…ШіШӘЩҶШҜШ§ШӘ ШұШ§ЩҮЩҶЩ…Ш§ (Help) ШҜШ§Ш®Щ„ ЩҫЩҶЩ„

            ---

            ### рҹ“Ҙ ШҜШ§ЩҶЩ„ЩҲШҜ

            | ЩҒШ§ЫҢЩ„ | ШӘЩҲШ¶ЫҢШӯ | ШіЫҢШіШӘЩ…вҖҢШ№Ш§Щ…Щ„ |
            |------|-------|------------|
            | **`SignageCMS-setup.exe`** | вӯҗ **ШіШұЩҲШұ All-in-One вҖ” ШЁШҜЩҲЩҶ DockerШҢ ЩҒЩӮШ· ШҜШ§ШЁЩ„вҖҢЪ©Щ„ЫҢЪ©** | Windows 10/11 / Server |
            | `*-android.apk` | Ш§ЩҫЩ„ЫҢЪ©ЫҢШҙЩҶ Android / Android TV вҖ” ЩҶШөШЁ Щ…ШіШӘЩӮЫҢЩ… | Android 5.0+ |
            | `*-android-playstore.aab` | Android App Bundle вҖ” ШўЩҫЩ„ЩҲШҜ ШҜШұ Google Play Store | Google Play |
            | `*-windows-player-setup.exe` | ЩҫЩ„ЫҢШұ Windows (ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ) | Windows 10/11 |
            | `*-server-setup.exe` | ШіШұЩҲШұ SignageCMS вҖ” ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ Docker/WSL2 (Inno Setup) | Windows 10/11 / Server |
            | `*-server.zip` | ШіШұЩҲШұ SignageCMS (Docker / Linux) | Windows / Linux |

            ### рҹ–ҘпёҸ ЩҶШөШЁ Windows Player
            1. ЩҒШ§ЫҢЩ„ `*-windows-player-setup.exe` ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ
            2. Ш§Ш¬ШұШ§ Ъ©ЩҶЫҢШҜ вҖ” ЩҶШөШЁ Ш®ЩҲШҜЪ©Ш§Шұ Ш§ШіШӘ
            3. ШўШҜШұШі ШіШұЩҲШұ ШұШ§ ЩҲШ§ШұШҜ Ъ©ЩҶЫҢШҜ ЩҲ Щ…ШӘШөЩ„ ШҙЩҲЫҢШҜ

            ### рҹ–ҘпёҸ ЩҶШөШЁ ШіШұЩҲШұ (ШіШ§ШҜЩҮвҖҢШӘШұЫҢЩҶ ШұШ§ЩҮ вҖ” ШЁШҜЩҲЩҶ Docker)
            ЩҒШ§ЫҢЩ„ **`SignageCMS-setup.exe`** ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ ЩҲ Ш§Ш¬ШұШ§ Ъ©ЩҶЫҢШҜ. ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ All-in-One ЩҮЩ…ЩҮвҖҢЪҶЫҢШІ
            (PHPШҢ MariaDBШҢ ШіШұЩҲШұ realtime) ШұШ§ ШЁЩҮвҖҢШөЩҲШұШӘ ШіШұЩҲЫҢШі ЩҲЫҢЩҶШҜЩҲШІ ЩҶШөШЁ Щ…ЫҢвҖҢЪ©ЩҶШҜ ЩҲ ШҜШ§ШҙШЁЩҲШұШҜ ШұШ§ ШЁШ§ШІ Щ…ЫҢвҖҢЪ©ЩҶШҜ.
            ЩҮЫҢЪҶ ЩҫЫҢШҙвҖҢЩҶЫҢШ§ШІЫҢ Щ„Ш§ШІЩ… ЩҶЫҢШіШӘ.

            ### рҹҗі ЩҶШөШЁ ШіШұЩҲШұ (ШұЩҲШҙ Docker вҖ” Ш§Ш®ШӘЫҢШ§ШұЫҢ)
            ЩҒШ§ЫҢЩ„ `*-server-setup.exe` ЫҢШ§ `*-server.zip` ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ вҖ”
            ЩҶШөШЁвҖҢЪ©ЩҶЩҶШҜЩҮ ШҜШұ ШөЩҲШұШӘ ШӘЩ…Ш§ЫҢЩ„ШҢ Docker/WSL2 ШұШ§ Ш®ЩҲШҜЪ©Ш§Шұ ЩҶШөШЁ ЩҲ Ш§ШіШӘЪ© ШұШ§ ШЁШ§Щ„Ш§ Щ…ЫҢвҖҢШўЩҲШұШҜ.

            ```bash
            # Linux
            unzip SignageCMS-*-server.zip && bash setup.sh

            # Windows (ZIP) вҖ” extract ЩҲ ШұЩҲЫҢ INSTALL.bat ШҜШ§ШЁЩ„вҖҢЪ©Щ„ЫҢЪ© Ъ©ЩҶЫҢШҜ
            ```

